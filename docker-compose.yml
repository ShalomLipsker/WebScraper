services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: webscraper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d webscraper']
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    build:
      context: .
      dockerfile: Dockerfile.rabbitmq
    restart: unless-stopped
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'rabbitmq-diagnostics -q ping && rabbitmq-plugins is_enabled rabbitmq_message_deduplication',
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    restart: 'no'
    entrypoint: >-
      /bin/sh -c
      "until mc alias set local http://minio:9000 minio minio123; do
      echo 'waiting for minio';
      sleep 1;
      done &&
      mc mb --ignore-existing local/scrape-results"

  job-manager:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        APP_NAME: job-manager
        APP_PORT: 3001
        APP_ENTRYPOINT: apps/job-manager/dist/main.js
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      JOB_MANAGER_HOST: 0.0.0.0
      JOB_MANAGER_TCP_PORT: 4001
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/webscraper
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_JOB_QUEUE_DEDUPLICATION_ENABLED: 'true'
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: 'true'
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123
      S3_DEFAULT_BUCKET: scrape-results
    ports:
      - '3001:3001'
      - '4001:4001'

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        APP_NAME: scraper
        APP_PORT: 3002
        APP_ENTRYPOINT: apps/scraper/dist/main.js
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3002
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_JOB_QUEUE_DEDUPLICATION_ENABLED: 'true'
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: 'true'
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123
      S3_DEFAULT_BUCKET: scrape-results
    ports:
      - '3002:3002'

  api:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        APP_NAME: api
        APP_PORT: 3000
        APP_ENTRYPOINT: apps/api/dist/main.js
    restart: unless-stopped
    depends_on:
      job-manager:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      JOB_MANAGER_HOST: job-manager
      JOB_MANAGER_TCP_PORT: 4001
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: 'true'
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123
      S3_DEFAULT_BUCKET: scrape-results
      SCRAPE_RESULT_PRESIGN_TTL_SECONDS: 300
    ports:
      - '3000:3000'

volumes:
  minio-data: