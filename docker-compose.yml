services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    restart: 'no'
    environment:
      MINIO_ALIAS: local
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      MINIO_BUCKET: html-scraped-jobs
      MINIO_LIFECYCLE_EXPIRE_DAYS: '1'
    volumes:
      - ./scripts/minio/configure-lifecycle.sh:/configure-lifecycle.sh:ro
    entrypoint: ['/bin/sh', '/configure-lifecycle.sh']

  job-manager:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        APP_NAME: job-manager
        APP_PORT: 3001
        APP_ENTRYPOINT: apps/job-manager/dist/main.js
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      JOB_MANAGER_HOST: 0.0.0.0
      JOB_MANAGER_TCP_PORT: 4001
      REDIS_URL: redis://redis:6379/0
    ports:
      - '3001:3001'
      - '4001:4001'

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        APP_NAME: scraper
        APP_PORT: 3002
        APP_ENTRYPOINT: apps/scraper/dist/main.js
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3002
      REDIS_URL: redis://redis:6379/0
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: 'true'
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123
      S3_DEFAULT_BUCKET: html-scraped-jobs
    ports:
      - '3002:3002'

  api:
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        APP_NAME: api
        APP_PORT: 3000
        APP_ENTRYPOINT: apps/api/dist/main.js
    restart: unless-stopped
    depends_on:
      job-manager:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      JOB_MANAGER_HOST: job-manager
      JOB_MANAGER_TCP_PORT: 4001
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: 'true'
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123
      S3_DEFAULT_BUCKET: html-scraped-jobs
      SCRAPE_RESULT_PRESIGN_TTL_SECONDS: 300
    ports:
      - '3000:3000'

volumes:
  minio-data: