apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: webscraper

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - postgres.yaml
  - rabbitmq.yaml
  - minio.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: webscraper-secrets
    envs:
      - webscraper-secrets.env


