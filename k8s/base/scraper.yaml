apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scraper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scraper
    spec:
      containers:
        - name: scraper
          image: webscraper-scraper:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: webscraper-config
            - secretRef:
                name: webscraper-secrets
          env:
            - name: PORT
              value: "3002"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: scraper
spec:
  selector:
    app.kubernetes.io/name: scraper
  ports:
    - name: http
      port: 3002
      targetPort: http
